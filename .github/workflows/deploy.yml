name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      app_version_override: # 0.1.0
        description: "Opcional — semver mostrado en la app (vacío = package.json)"
        required: false
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Versión y metadatos de build
        id: meta
        env:
          OVERRIDE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.app_version_override || '' }}
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          if [ -n "$OVERRIDE" ]; then
            APP_VER="$OVERRIDE"
          else
            APP_VER=$(jq -r .version package.json)
          fi
          echo "app_version=$APP_VER" >> "$GITHUB_OUTPUT"
          echo "build_id=${{ github.run_number }}-$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "build_time=$BUILD_TIME" >> "$GITHUB_OUTPUT"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-install-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-install-

      - run: bun install --frozen-lockfile

      - name: Build
        env:
          NEXT_PUBLIC_APP_VERSION: ${{ steps.meta.outputs.app_version }}
          NEXT_PUBLIC_BUILD_ID: ${{ steps.meta.outputs.build_id }}
          NEXT_PUBLIC_BUILD_TIME: ${{ steps.meta.outputs.build_time }}
        run: bun run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
